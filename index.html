<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>A.K — Temple Runner</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- PARALLAX BG -->
  <div class="parallax-wrap">
    <div class="p-layer sky"></div>
    <div class="p-layer moon"></div>
    <div class="p-layer stars"></div>
    <div class="p-layer far-trees" id="farTrees"></div>
    <div class="p-layer near-trees" id="nearTrees"></div>
    <div class="p-layer ruins" id="ruins"></div>
  </div>

  <!-- START SCREEN -->
  <div id="startScreen" class="screen active">
    <div class="title-block">
      <div class="ak-emblem">⚡</div>
      <h1 class="game-title">A.K</h1>
      <p class="game-sub">TEMPLE RUNNER</p>
      <p class="game-tagline">Beyond Sight · Beyond Speed</p>
    </div>
    <div class="badge-row">
      <span class="badge">🎤 Voice</span>
      <span class="badge">📱 Touch</span>
      <span class="badge">⌨️ Keys</span>
    </div>
    <div class="hint-grid">
      <div class="hint">⬆ SPACE — Jump</div>
      <div class="hint">⬇ DOWN — Slide</div>
      <div class="hint">🎤 "JUMP" — Fly</div>
      <div class="hint">🎤 "SLIDE" — Duck</div>
    </div>
    <button class="cta-btn" id="btnStart">⚡ BEGIN QUEST</button>
    <div class="secondary-btns">
      <button class="sec-btn" id="btnMic">🎤 Voice: OFF</button>
      <button class="sec-btn" id="btnMusic">🎵 Music: ON</button>
    </div>
    <div class="hs-line">⚡ Best Score: <span id="hsDisplay">0</span></div>
    <div class="credits-line">by Arush &amp; Ayushi · A.K Squad</div>
  </div>

  <!-- GAME OVER SCREEN -->
  <div id="gameOverScreen" class="screen">
    <div class="go-skull">💀</div>
    <h2 class="go-title">CURSED!</h2>
    <div class="go-scores">
      <div class="go-row">Score <span id="goScore">0</span></div>
      <div class="go-row gold">Best &nbsp;<span id="goBest">0</span></div>
      <div class="go-row cyan">Coins <span id="goCoins">0</span></div>
    </div>
    <button class="cta-btn" id="btnRestart">↺ RUN AGAIN</button>
    <button class="sec-btn" id="btnMenu">⌂ MAIN MENU</button>
  </div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="hud-left">
      <span class="hud-score" id="hudScore">0</span>
      <span class="hud-lbl">PTS</span>
    </div>
    <div class="hud-center">
      <span class="hud-speed" id="hudSpeed">× 1.0</span>
    </div>
    <div class="hud-right">
      <span class="hud-coin">💰</span>
      <span class="hud-coins" id="hudCoins">0</span>
      <span class="hud-mic" id="micDot">🎤</span>
    </div>
  </div>

  <!-- CANVAS -->
  <canvas id="gameCanvas"></canvas>

  <!-- MOBILE CONTROLS -->
  <div id="mobileCtrl" class="hidden">
    <button class="mob-btn" id="mbJump">⬆<span>JUMP</span></button>
    <button class="mob-btn" id="mbSlide">⬇<span>SLIDE</span></button>
  </div>

  <!-- VOICE TOAST -->
  <div id="voiceToast" class="voice-toast hidden"></div>

  <!-- PARTICLES DIV -->
  <div id="fx"></div>

  <script src="game.js"></script>
</body>
</html>
